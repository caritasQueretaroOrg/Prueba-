<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos - Sistema Utopias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              neon: '#00ff5f',
              cyanGlow: '#31f7ff',
              darkInk: '#02050a'
            },
            fontFamily: {
              display: ['Orbitron', 'Rajdhani', 'Arial', 'sans-serif']
            },
            boxShadow: {
              neon: '0 0 22px rgba(0,255,95,.55)',
              cyan: '0 0 24px rgba(49,247,255,.28)'
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen overflow-x-hidden bg-darkInk text-slate-100 font-display">
    <main class="relative min-h-screen">
      <div class="scanline pointer-events-none fixed inset-0 z-40 opacity-25"></div>
      <div class="absolute inset-0 dream-grid"></div>
      <div class="absolute left-1/2 top-0 h-[560px] w-[560px] -translate-x-1/2 rounded-full bg-cyan-300/10 blur-3xl"></div>

      <header class="relative z-[60] mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-5 sm:px-6 lg:px-8">
        <a href="/inicio.html" class="glitch-button border border-cyanGlow/70 bg-cyanGlow/10 px-5 py-2.5 text-xs font-bold uppercase tracking-wide text-cyanGlow shadow-cyan transition hover:bg-cyanGlow hover:text-black">
          Inicio
        </a>
        <div class="relative">
          <button id="cartButton" class="glitch-button relative border border-neon bg-neon px-5 py-2.5 text-xs font-bold uppercase tracking-wide text-black shadow-neon transition hover:bg-transparent hover:text-neon" type="button" aria-expanded="false" aria-controls="cartPanel">
            Carrito
            <span id="cartCount" class="absolute -right-3 -top-3 grid h-7 w-7 place-items-center rounded-full border border-neon bg-black text-sm text-neon shadow-neon">0</span>
          </button>
          <div id="cartPanel" class="panel absolute right-0 top-14 z-[70] hidden w-72 p-4">
            <p class="border-b border-neon/20 pb-3 text-sm font-bold uppercase tracking-[.2em] text-neon">Productos agregados</p>
            <div id="cartItems" class="mt-3 space-y-2 font-sans text-sm text-slate-300">
              <p class="text-slate-500">Tu carrito est&aacute; vac&iacute;o.</p>
            </div>
          </div>
        </div>
      </header>

      <section class="relative z-10 mx-auto max-w-7xl px-4 pb-12 pt-3 sm:px-6 lg:px-8">
        <div class="max-w-4xl">
          <h1 class="glitch-title text-[clamp(2.4rem,7vw,5.8rem)] font-extrabold leading-[1.04] tracking-wide text-slate-100">
            Compra, 
            <span class="block text-neon drop-shadow-[0_0_18px_rgba(0,255,95,.8)]">&iexcl;vive!</span>
          </h1>
        </div>

        <section id="productGrid" class="mt-9 grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></section>
      </section>
    </main>

    <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/75 px-4 py-6 backdrop-blur-sm">
      <article class="panel relative max-h-[92vh] w-full max-w-3xl overflow-auto p-5 sm:p-6">
        <button id="closeModal" class="glitch-button absolute right-4 top-4 border border-neon bg-black px-3 py-2 text-xs font-bold uppercase tracking-wide text-neon hover:bg-neon hover:text-black" type="button">
          Cerrar
        </button>
        <div class="grid gap-5 md:grid-cols-[1.1fr_.9fr]">
          <img id="modalImage" src="" alt="" class="breathe-image h-72 w-full border border-neon/30 object-cover shadow-cyan md:h-full" />
          <div class="pr-0 md:pr-8">
            <p class="mb-3 font-sans text-xs font-semibold uppercase tracking-[.25em] text-cyanGlow">Detalle del producto</p>
            <h2 id="modalTitle" class="text-3xl font-bold text-neon"></h2>
            <p id="modalPrice" class="mt-3 text-2xl font-bold text-slate-100"></p>
            <p id="modalDescription" class="mt-4 font-sans text-base leading-7 text-slate-300"></p>
            <button id="modalAdd" class="glitch-button mt-6 border border-neon bg-neon px-6 py-3 text-xs font-bold uppercase tracking-wide text-black shadow-neon hover:bg-transparent hover:text-neon" type="button">
              A&ntilde;adir al carrito
            </button>
          </div>
        </div>
      </article>
    </div>

    <script src="/productos.js"></script>
  </body>
</html>
